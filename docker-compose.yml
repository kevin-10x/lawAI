services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8787:8787"
    environment:
      - NODE_ENV=development
    volumes:
      - ./api:/app
      - /app/node_modules
    command: npx wrangler dev --ip 0.0.0.0 --port 8787

  frontend:
    build:
      context: ./frontend
      target: dev
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:8787
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api
